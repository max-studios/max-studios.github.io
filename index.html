<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=^, initial-scale=1.0">
    <title>max-studios | Home</title>
    <style>
        /* Grundlegendes Styling */
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #0b0e14;
        color: #e0e0e0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

    header h1 {
        font-size: 3rem;
        letter-spacing: 2px;
        color: #00ffcc;
        text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        margin-bottom: 2rem;
    }

    /* Button-Container */
    .buttonBox {
        padding: 20px;
    }

    /* Der Button */
    button {
        background: transparent;
        color: #00ffcc;
        border: 2px solid #00ffcc;
        padding: 15px 40px;
        font-size: 1.2rem;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        font-weight: bold;
        border-radius: 5px;
    }

    /* Hover-Effekt */
    button:hover {
        background-color: #00ffcc;
        color: #0b0e14;
        box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
    }
    </style>
</head>
<body>
    <header>
        <h1>max-studios.github.io</h1>
    </header>
    <div class="buttonBox">
        <button id="btnClick">Play Alien Hazard</button>
    </div>
</body>
<script>
// Wir suchen das Element über die ID
    document.getElementById("btnClick").addEventListener("click", function() {
        // Hier kommt der Befehl zur Weiterleitung
        window.location.href = "game.html";
    });
</script>
</html>
