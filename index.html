<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game with Clock & History</title>
    <style>
 body {

margin: 0;

overflow: hidden;

background-image: url("assets/background.png");

/* Das Bild soll so groß skaliert werden, dass es den Screen füllt */

background-size: cover;

/* Verhindert das Wiederholen */

background-repeat: no-repeat;

/* Zentriert das Bild auf dem Screen */

background-position: center;

/* Der entscheidende Befehl: Er zwingt Browser, die Skalierung

kanten-scharf zu halten, statt sie zu glätten (blurren) */

image-rendering: pixelated;

image-rendering: -moz-crisp-edges;

image-rendering: crisp-edges;

} 

        /* Hilfsklasse für Pixel-Look */
        .pixel-art {
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            background-repeat: no-repeat;
            background-position: center;
        }

        .ui {
            position: absolute; top: 20px; left: 20px;
            color: #00d4ff; font-family: 'Courier New', Courier, monospace;
            background: rgba(0, 0, 0, 0.7); padding: 15px 25px;
            border-radius: 0 15px 0 15px; border-left: 4px solid #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
            backdrop-filter: blur(5px); text-transform: uppercase;
            letter-spacing: 1px; z-index: 10;
        }

        #timer, #score { font-weight: bold; color: #fff; text-shadow: 0 0 5px #00d4ff; }
        #real-clock { font-size: 0.75em; margin-bottom: 8px; color: rgba(0, 212, 255, 0.8); }

        #game-container { width: 100vw; height: 100vh; position: relative; }

        /* Ufo: Skaliert auf 60x45px */
        #player {
            width: 60px; height: 45px; position: absolute;
            background-image: url('assets/ufo.png'); 
            background-size: contain;
            transition: transform 0.1s;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes coinGlow {
            0% { filter: drop-shadow(0 0 5px rgb(255, 225, 255)); }
            50% { filter: drop-shadow(0 0 5px rgb(255, 208, 255)); }
            100% { filter: drop-shadow(0 0 5px rgb(255, 193, 255)); }
        }

        /* Kristall: Skaliert auf 40x34px */
        .coin {
            position: absolute; 
            width: 40px; height: 34px;
            background-image: url("assets/christal1.png");
            background-size: contain;
            animation: popIn 0.5s ease-out forwards, coinGlow 1.5s infinite ease-in-out;
        }
        
        /* Krater: Skaliert auf 44x44px */
        .obstacle { 
            position: absolute; 
            width: 44px; height: 44px; 
            background-image: url("assets/krater1.png");
            background-size: 44px 44px;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>

    <div class="ui">
        <div id="real-clock">Lädt...</div>
        Zeit: <span id="timer">0.00</span>s | Punkte: <span id="score">0</span>
        <hr style="border: 0; border-top: 1px solid #00d4ff; margin: 10px 0;">
        <b style="font-size: 0.8em;">Highscores:</b>
        <div id="highscore-list" style="font-size: 0.7em; margin-top: 5px;">Lädt...</div>
    </div>

    <div id="game-container">
        <div id="player"></div>
    </div>

    <script>
        const player = document.getElementById('player');
        const timerDisplay = document.getElementById('timer');
        const scoreDisplay = document.getElementById('score');
        const highscoreDisplay = document.getElementById('highscore-list');
        const gameContainer = document.getElementById('game-container');
        const clockDisplay = document.getElementById('real-clock');

        const coinSound = new Audio("assets/coin.mp3");
        const gameoverSound = new Audio("assets/gameover.mp3");

        let score = 0;
        let posX = 100, posY = 100;
        const speed = 5; 
        let currentDir = 'd'; 
        const startTime = Date.now();
        let gameOver = false;

        const obstacles = [];
        let currentCoin = null;

        function updateClock() {
            const now = new Date();
            clockDisplay.innerText = now.toLocaleDateString('de-DE') + " | " + now.toLocaleTimeString('de-DE');
        }
        setInterval(updateClock, 1000);
        updateClock();

        function updateHighscoreDisplay() {
            const scores = JSON.parse(localStorage.getItem('game_scores_v2')) || [];
            highscoreDisplay.innerHTML = scores.length > 0 
                ? scores.map((s, i) => `${i+1}. <b>${s.points} Pkt</b> <small>${s.date}</small>`).join('<br>')
                : "Keine Rekorde";
        }

        function saveScore(newPoints) {
            let scores = JSON.parse(localStorage.getItem('game_scores_v2')) || [];
            const now = new Date();
            const dateStr = now.toLocaleDateString('de-DE') + " " + now.toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'});
            scores.push({ points: newPoints, date: dateStr });
            scores.sort((a, b) => b.points - a.points);
            localStorage.setItem('game_scores_v2', JSON.stringify(scores.slice(0, 3)));
        }

        function createObstacle(x, y) {
            const obs = document.createElement('div');
            obs.className = 'obstacle';
            obs.style.left = x + 'px';
            obs.style.top = y + 'px';
            gameContainer.appendChild(obs);
            obstacles.push(obs);
        }

        function spawnCoin() {
            if (gameOver) return;
            const coin = document.createElement('div');
            coin.className = 'coin';
            const x = Math.random() * (window.innerWidth - 40);
            const y = Math.random() * (window.innerHeight - 34);
            coin.style.left = x + 'px';
            coin.style.top = y + 'px';
            gameContainer.appendChild(coin);
            currentCoin = coin;
        }

        function checkCollision(r1, r2) {
            return !(r1.right < r2.left || r1.left > r2.right || 
                     r1.bottom < r2.top || r1.top > r2.bottom);
        }

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (['w', 'a', 's', 'd'].includes(key)) currentDir = key;
        });
// NEUE WISCH-STEUERUNG
let touchStartX = 0;
let touchStartY = 0;

window.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
}, {passive: false});

window.addEventListener('touchend', (e) => {
    if (touchStartX === 0 || touchStartY === 0) return;

    const touchEndX = e.changedTouches[0].clientX;
    const touchEndY = e.changedTouches[0].clientY;

    const diffX = touchEndX - touchStartX;
    const diffY = touchEndY - touchStartY;

    if (Math.abs(diffX) > 30 || Math.abs(diffY) > 30) {
        if (Math.abs(diffX) > Math.abs(diffY)) {
            currentDir = diffX > 0 ? 'd' : 'a';
        } else {
            currentDir = diffY > 0 ? 's' : 'w';
        }
    }

    touchStartX = 0;
    touchStartY = 0;
}, {passive: false});

        function update() {
            if (gameOver) return;

            timerDisplay.innerText = ((Date.now() - startTime) / 1000).toFixed(2);

            if (currentDir === 'w') posY -= speed;
            if (currentDir === 's') posY += speed;
            if (currentDir === 'a') { posX -= speed; player.style.transform = "scaleX(-1)"; }
            if (currentDir === 'd') { posX += speed; player.style.transform = "scaleX(1)"; }

            // Spieler an Bildschirmrändern halten (basierend auf 60px Breite / 45px Höhe)
            posX = Math.max(0, Math.min(posX, window.innerWidth - 60));
            posY = Math.max(0, Math.min(posY, window.innerHeight - 45));
            player.style.left = posX + 'px';
            player.style.top = posY + 'px';

            const playerRect = player.getBoundingClientRect();

            if (currentCoin) {
                if (checkCollision(playerRect, currentCoin.getBoundingClientRect())) {
                    score++;
                    scoreDisplay.innerText = score;
                    const x = parseFloat(currentCoin.style.left);
                    const y = parseFloat(currentCoin.style.top);
                    currentCoin.remove();
                    currentCoin = null;
                    coinSound.play().catch(() => {});
                    setTimeout(() => { createObstacle(x, y); }, 500);
                    setTimeout(spawnCoin, 2000);
                }
            }

            obstacles.forEach(obs => {
                if (checkCollision(playerRect, obs.getBoundingClientRect())) {
                    gameOver = true;
                    saveScore(score);
                    gameoverSound.play().catch(() => {});
                    alert("Game Over! Punkte: " + score);
                    location.reload();
                }
            });
            requestAnimationFrame(update);
        }

        updateHighscoreDisplay();
        spawnCoin();
        update();
    </script>
</body>
</html>
